spring.application.name=instacurator-backend
# Default to local profile; overridden by SPRING_PROFILES_ACTIVE env var in Railway/AWS.
spring.profiles.default=local

# Honor Railway's $PORT env var; default to 8080 locally.
server.port=${PORT:8080}

# Actuator health is also exposed at /actuator/health by default.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# OpenAI proxy config. The API key is sourced from the OPENAI_API_KEY env var;
# the empty default lets the app (and tests) start without it set.
openai.api-key=${OPENAI_API_KEY:}
openai.scoring-model=gpt-4o-mini
openai.selection-model=gpt-4.1
openai.base-url=https://api.openai.com
